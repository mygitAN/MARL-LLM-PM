environment:
  sleeves: [MOMENTUM, VALUE, QUALITY]
  transaction_cost: 0.001
  max_weight_per_sleeve: 0.70
  rebalance_frequency: "weekly"  # daily|weekly|monthly
  steps_per_year: 52  # 52 for weekly, 252 for daily

llm:
  enabled: true
  mode: "regime_interpreter"  # fixed for thesis
  cache_enabled: true
  cache_dir: ".cache/regimes"
  deterministic: true  # temperature=0
  labels: [TRENDING-LOWVOL, STRESS-DRAWDOWN, RECOVERY, SIDEWAYS-HIGHCORR, RISK-OFF-DEFENSIVE]

evaluation:
  split_train: 0.60
  split_val: 0.20
  split_test: 0.20
  test_interval_months: 6
  holdout_months: 12

backtesting:
  initial_capital: 100000.0

data:
  sleeve_returns_csv: "data/sleeve_returns.csv"  # columns = MOMENTUM, VALUE, QUALITY
  market_features_csv: "data/market_features.csv"  # optional numeric features
